name: Deploy to Firebase

on:
  push:
    branches:
      - master
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - 'react-app/dist/**'
      - '.github/workflows/firebase-deploy.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --only firestore:rules,storage:rules
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Hosting (optional - uncomment when ready)
        # Uncomment when React app build is set up in CI/CD
        # run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN }}" --only hosting
        run: echo "Hosting deployment would run here"
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
